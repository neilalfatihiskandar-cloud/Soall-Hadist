<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            color:white;
            text-align:center;
        }

        nav{
            padding:20px;
            background:rgba(0,0,0,0.2);
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 15px;
            font-weight:bold;
        }

        .hero{
            height:80vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
        }

        .hero h1{
            font-size:4rem;
            margin-bottom:10px;
        }

        .hero p{
            font-size:1.2rem;
            margin-bottom:20px;
        }

        .btn{
            background:white;
            color:#2a5298;
            padding:12px 25px;
            border-radius:30px;
            text-decoration:none;
            font-weight:bold;
        }

        footer{
            padding:20px;
            background:rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>

    <section class="hero">
        <h1>Selamat Datang</h1>
        <p>Website GitHub Pages Pertamaku</p>
        <a href="#" class="btn">Mulai Sekarang</a>
    </section>

    <footer>
        <p>© 2026 Website Saya</p>
    </footer>

</body>
</html>
